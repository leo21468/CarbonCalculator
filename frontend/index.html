<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>碳足迹 Agent</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1>碳足迹 Agent</h1>
    <p class="subtitle">输入产品名称查询碳足迹，或上传发票进行分类与排放核算</p>
    <p class="api-status" id="apiStatus">检测服务...</p>

    <!-- 顶部导航 -->
    <div class="tabs main-tabs">
      <button type="button" class="active" data-tab="query">产品查询</button>
      <button type="button" data-tab="invoice">发票分析</button>
      <button type="button" data-tab="manage">数据管理</button>
      <button type="button" data-tab="stats">统计报表</button>
    </div>

    <!-- ───────────────────────────────────────────────── -->
    <!-- 面板1：产品查询                                    -->
    <!-- ───────────────────────────────────────────────── -->
    <div class="panel show" id="panel-query">
      <div class="card">
        <div class="form-row">
          <input type="text" id="productInput" placeholder="输入产品名称，如：电力、汽油、鸡蛋、光伏" autofocus>
          <button id="btnQuery">查询</button>
          <button class="secondary" id="btnClear">清空</button>
        </div>
        <div id="queryHistory"></div>
        <div class="result" id="result"></div>
      </div>
    </div>

    <!-- ───────────────────────────────────────────────── -->
    <!-- 面板2：发票分析                                    -->
    <!-- ───────────────────────────────────────────────── -->
    <div class="panel" id="panel-invoice">
      <div class="card">
        <div class="tabs" style="margin-bottom:1rem;">
          <button type="button" class="active" data-invoice-mode="file">PDF 上传</button>
          <button type="button" data-invoice-mode="json">JSON 提交</button>
        </div>

        <div id="invoiceFileSection">
          <form class="add-form" id="invoiceForm" enctype="multipart/form-data">
            <div class="row">
              <label>选择 PDF 发票文件 *</label>
              <input type="file" id="invoiceFile" accept=".pdf" style="padding:0.6rem;cursor:pointer;">
            </div>
            <p style="color:var(--muted);font-size:0.8rem;margin:0 0 1rem;">
              支持中国增值税电子发票 PDF，系统将自动提取明细行并分类至 Scope 1/2/3
            </p>
            <button type="submit" id="btnUpload">上传并分类</button>
          </form>
        </div>

        <div id="invoiceJsonSection" style="display:none;">
          <div class="row add-form">
            <label>发票 JSON（需含 lines 或 items，可选 seller、invoice_number、total_amount）</label>
            <textarea id="invoiceJsonInput" rows="10"
              placeholder='{"lines":[{"name":"电力*电费*","amount":4000,"quantity":5000,"unit":"度"}],"seller":{"name":"国网上海"},"invoice_number":"INV001"}'
              style="font-family:monospace;font-size:0.85rem;"></textarea>
          </div>
          <button type="button" id="btnSubmitJson">提交并核算</button>
        </div>

        <div id="invoiceResult" class="result"></div>
      </div>
    </div>

    <!-- ───────────────────────────────────────────────── -->
    <!-- 面板3：数据管理                                    -->
    <!-- ───────────────────────────────────────────────── -->
    <div class="panel" id="panel-manage">
      <!-- 新增产品表单 -->
      <div class="card">
        <h3 style="margin-top:0;font-size:1.05rem;">新增自定义产品</h3>
        <form class="add-form" id="addForm">
          <div class="row">
            <label>产品名称 *</label>
            <input type="text" name="product_name" placeholder="如：自定义办公纸">
            <div class="field-error" id="errProductName">请输入产品名称</div>
          </div>
          <div class="row">
            <label>碳种类 *</label>
            <input type="text" name="carbon_type" placeholder="如：Scope 3、电力、燃料" required>
          </div>
          <div class="row">
            <label>碳足迹描述</label>
            <input type="text" name="carbon_footprint" placeholder="如：1.2kgCO2e/千克">
          </div>
          <div class="form-row">
            <div class="row" style="flex:1">
              <label>每单位 CO₂ (kg) *</label>
              <input type="number" name="co2_per_unit" step="0.001" placeholder="1.2" required>
            </div>
            <div class="row" style="flex:1">
              <label>单位 *</label>
              <input type="text" name="unit" placeholder="千克" required>
            </div>
          </div>
          <div class="row">
            <label>碳价 (元/吨)</label>
            <input type="number" name="price_per_ton" value="100" step="1">
          </div>
          <div class="row">
            <label>备注</label>
            <textarea name="remark" rows="2" placeholder="可选"></textarea>
          </div>
          <button type="submit">添加产品</button>
        </form>
        <div id="addMsg" class="result" style="margin-top:1rem"></div>
      </div>

      <!-- 产品列表 -->
      <div class="card">
        <h3 style="margin-top:0;font-size:1.05rem;">自定义产品列表</h3>
        <div class="toolbar">
          <input type="text" id="searchProduct" placeholder="按名称搜索...">
          <button class="secondary" id="btnSortEmission">按排放量排序 ↓</button>
          <button class="secondary" id="btnExportProducts">导出 CSV</button>
        </div>
        <div class="product-list" id="productList">加载中...</div>
      </div>
    </div>

    <!-- ───────────────────────────────────────────────── -->
    <!-- 面板4：统计报表                                    -->
    <!-- ───────────────────────────────────────────────── -->
    <div class="panel" id="panel-stats">
      <div class="card">
        <h3 style="margin-top:0;font-size:1.05rem;">发票类别统计</h3>
        <div class="stats-grid" id="statsGrid">加载中...</div>
        <h3 style="font-size:1.05rem;">类别明细记录</h3>
        <div style="max-height:360px;overflow-y:auto;" id="categoryList">加载中...</div>
      </div>

      <!-- 图表占位 -->
      <div class="card">
        <h3 style="margin-top:0;font-size:1.05rem;">图表分析</h3>
        <div class="chart-placeholder">
          📊 图表功能即将上线<br>
          <span style="font-size:0.8rem;">将支持各 Scope 排放趋势、行业分布饼图等可视化分析</span>
        </div>
      </div>
    </div>
  </div><!-- /.container -->

  <!-- Toast 容器由 app.js 动态创建 -->
  <script src="/static/app.js"></script>
</body>
</html>
