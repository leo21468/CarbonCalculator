<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>碳足迹 Agent</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --border: #30363d;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .form-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    input, select, textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 0.9rem;
      border-radius: 8px;
      font-size: 0.95rem;
      width: 100%;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(88,166,255,0.2);
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.65rem 1.25rem;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .result {
      margin-top: 1rem;
    }
    .result-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .result-item:last-child { border-bottom: none; }
    .result-item .k { color: var(--muted); }
    .result-item .v { color: var(--success); font-weight: 500; }
    .error { color: #f85149; }
    .source-tag {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      background: rgba(63,185,80,0.2);
      color: var(--success);
    }
    .source-tag.cpcd { background: rgba(88,166,255,0.2); color: var(--accent); }
    .source-tag.custom { background: rgba(63,185,80,0.2); color: var(--success); }
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .tabs button {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .tabs button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .panel { display: none; }
    .panel.show { display: block; }
    .add-form label { display: block; margin-bottom: 0.3rem; color: var(--muted); font-size: 0.85rem; }
    .add-form .row { margin-bottom: 1rem; }
    .product-list { max-height: 200px; overflow-y: auto; }
    .product-list .item {
      padding: 0.5rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>碳足迹 Agent</h1>
    <p class="subtitle">输入产品名称，查询碳种类、二氧化碳当量及碳成本价格</p>

    <div class="tabs">
      <button type="button" class="active" data-tab="query">查询</button>
      <button type="button" data-tab="add">新增数据</button>
      <button type="button" data-tab="list">自定义列表</button>
    </div>

    <!-- 查询面板 -->
    <div class="panel show" id="panel-query">
      <div class="card">
        <div class="form-row">
          <input type="text" id="productInput" placeholder="输入产品名称，如：电力、汽油、鸡蛋、光伏" autofocus>
          <button id="btnQuery" style="min-width: 100px;">查询</button>
        </div>
        <div class="result" id="result"></div>
      </div>
    </div>

    <!-- 新增面板 -->
    <div class="panel" id="panel-add">
      <div class="card">
        <form class="add-form" id="addForm">
          <div class="row">
            <label>产品名称 *</label>
            <input type="text" name="product_name" placeholder="如：自定义办公纸" required>
          </div>
          <div class="row">
            <label>碳种类 *</label>
            <input type="text" name="carbon_type" placeholder="如：Scope 3、电力、燃料" required>
          </div>
          <div class="row">
            <label>碳足迹描述</label>
            <input type="text" name="carbon_footprint" placeholder="如：1.2kgCO2e / 千克">
          </div>
          <div class="form-row">
            <div class="row" style="flex:1">
              <label>每单位 CO2 (kg) *</label>
              <input type="number" name="co2_per_unit" step="0.001" placeholder="1.2" required>
            </div>
            <div class="row" style="flex:1">
              <label>单位 *</label>
              <input type="text" name="unit" placeholder="千克" required>
            </div>
          </div>
          <div class="row">
            <label>碳价 (元/吨)</label>
            <input type="number" name="price_per_ton" value="100" step="1">
          </div>
          <div class="row">
            <label>备注</label>
            <textarea name="remark" rows="2" placeholder="可选"></textarea>
          </div>
          <button type="submit">添加</button>
        </form>
        <div id="addMsg" class="result" style="margin-top:1rem"></div>
      </div>
    </div>

    <!-- 列表面板 -->
    <div class="panel" id="panel-list">
      <div class="card">
        <div class="product-list" id="productList">加载中...</div>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    const $ = id => document.getElementById(id);
    const resultEl = $('result');
    const productInput = $('productInput');
    const btnQuery = $('btnQuery');
    const addForm = $('addForm');
    const addMsg = $('addMsg');
    const productList = $('productList');

    function showResult(data) {
      if (data.source === 'none') {
        resultEl.innerHTML = `<p class="error">${data.message || '未找到匹配'}</p>`;
        return;
      }
      const tag = data.source === 'custom' ? 'custom' : 'cpcd';
      const rows = [
        ['来源', `<span class="source-tag ${tag}">${data.source === 'custom' ? '自定义' : 'CPCD'}</span>`],
        ['产品名称', data.product_name],
        ['碳种类', data.carbon_type],
        ['碳足迹', data.carbon_footprint || '-'],
        ['CO2当量 (kg/单位)', data.co2_per_unit_kg != null ? data.co2_per_unit_kg : '-'],
        ['单位', data.unit || '-'],
        ['碳成本 (元/单位)', data.carbon_cost_cny != null ? '¥' + data.carbon_cost_cny : '-'],
      ];
      if (data.similarity != null) rows.splice(1, 0, ['相似度', data.similarity]);
      resultEl.innerHTML = '<div class="result-item"><span class="k">' + rows.map(([k,v]) => `<span class="k">${k}</span></div><div class="result-item"><span class="v">${v}</span>`).join('</div><div class="result-item"><span class="k">') + '</span></div>';
      resultEl.innerHTML = rows.map(([k,v]) => `<div class="result-item"><span class="k">${k}</span><span class="v">${v}</span></div>`).join('');
    }

    async function query() {
      const name = productInput.value.trim();
      if (!name) { resultEl.innerHTML = '<p class="error">请输入产品名称</p>'; return; }
      btnQuery.disabled = true;
      resultEl.innerHTML = '查询中...';
      try {
        const res = await fetch(API + '/api/match', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ product_name: name }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || '请求失败');
        showResult(data);
      } catch (e) {
        resultEl.innerHTML = `<p class="error">${e.message}</p>`;
      } finally {
        btnQuery.disabled = false;
      }
    }

    btnQuery.addEventListener('click', query);
    productInput.addEventListener('keydown', e => { if (e.key === 'Enter') query(); });

    addForm.addEventListener('submit', async e => {
      e.preventDefault();
      const fd = new FormData(addForm);
      const body = {
        product_name: fd.get('product_name'),
        carbon_type: fd.get('carbon_type'),
        carbon_footprint: fd.get('carbon_footprint') || '',
        co2_per_unit: parseFloat(fd.get('co2_per_unit')),
        unit: fd.get('unit'),
        price_per_ton: parseFloat(fd.get('price_per_ton')) || 100,
        remark: fd.get('remark') || '',
      };
      addMsg.innerHTML = '提交中...';
      try {
        const res = await fetch(API + '/api/products', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || '添加失败');
        addMsg.innerHTML = '<span class="v">✓ 添加成功</span>';
        addForm.reset();
        loadProductList();
      } catch (e) {
        addMsg.innerHTML = `<span class="error">${e.message}</span>`;
      }
    });

    async function loadProductList() {
      try {
        const res = await fetch(API + '/api/products');
        const list = await res.json();
        productList.innerHTML = list.length ? list.map(p => `<div class="item">${p.product_name} | ${p.carbon_type} | ${p.carbon_footprint || '-'} | ${p.co2_per_unit} kg/${p.unit}</div>`).join('') : '暂无自定义数据';
      } catch {
        productList.innerHTML = '加载失败';
      }
    }

    document.querySelectorAll('.tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('show'));
        btn.classList.add('active');
        $('panel-' + btn.dataset.tab).classList.add('show');
        if (btn.dataset.tab === 'list') loadProductList();
      });
    });

    loadProductList();
  </script>
</body>
</html>
